<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/nutrients.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <title>Find Nutrients | EveryBite</title>
</head>
<body>
    <nav class="main-nav">
        <a href="/index.html">Home</a>
    </nav>
    <main class="nutrient-page">
        <h2>Find Nutrients</h2>
        <form class="nutrient-search">
            <input 
            id="nutrient-input"
            type="text"
            name="nutrient"
            placeholder="Search for Nutrients"
            required>

        <button type="submit">Search</button>    
        </form>


        <section class="nutrient-card" id="nutrient-result">
            <h3></h3>
            <p></p>
            <h5>Daily Recommended Intake</h5>
            <p id="nutrient-rdi"></p>

            <section class="benefits-section"></section>
            <section class="systems-section"></section>
            <section class="foods-section"></section>
        </section>   
    </main>
    <script src="/js/nutrients.js"></script>
</body>
</html>
